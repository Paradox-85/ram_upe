trigger:
  branches:
    include:
      - '*'

pr: none

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0

- bash: |
    set -e

    git config --global user.name "Azure DevOps Mirror"
    git config --global user.email "adzv@ramboll.com"

    cd "$(Build.SourcesDirectory)"

    git remote remove github 2>/dev/null || true
    git remote add github https://$(GITHUB_USER):$(GITHUB_PAT)@github.com/Paradox-85/ram_upe.git

    git checkout -B main origin/main
    git push github main:main --force
    git push github --tags --force
  displayName: Push main and tags to GitHub
  env:
    GITHUB_PAT: $(GITHUB_PAT)
    GITHUB_USER: $(GITHUB_USER)
